<!DOCTYPE html>
<html>
<head>
    <title>Health AI Chatbot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f6f9;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .chat-container {
            width: 420px;
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }

        #chat-box {
            height: 420px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }

        /* User bubble */
        .user {
            text-align: right;
        }

        .user div {
            background: #007bff;
            color: white;
            display: inline-block;
            padding: 10px 14px;
            border-radius: 14px;
            margin: 6px;
            max-width: 80%;
        }

        /* Bot bubble */
        .bot {
            text-align: left;
        }

        .bot div {
            background: #e9ecef;
            display: inline-block;
            padding: 10px 14px;
            border-radius: 14px;
            margin: 6px;
            max-width: 80%;
        }

        .input-area {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <h3>🩺 Medical AI Assistant</h3>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Describe your symptoms..." />
        <button onclick="sendMessage()">Send</button>
        <button onclick="copyChat()">Copy</button>
    </div>
</div>

<script>
async function sendMessage() {

    let input = document.getElementById("user-input");
    let message = input.value.trim();

    if (!message) return;

    let chatBox = document.getElementById("chat-box");

    // User bubble
    chatBox.innerHTML += `<div class="user"><div>${message}</div></div>`;
    input.value = "";

    // Loader
    chatBox.innerHTML += `<div class="bot" id="loader"><div>Typing...</div></div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        let response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: message})
        });

        if (!response.ok) throw new Error("Server error");

        let data = await response.json();

        document.getElementById("loader")?.remove();

        // Medical card formatting
        let sections = data.reply.split("\n");

        let formatted = sections.map(s =>
            `<div style="margin-bottom:6px;">${s}</div>`
        ).join("");

        chatBox.innerHTML += `<div class="bot"><div>${formatted}</div></div>`;
    }
    catch(error) {
        document.getElementById("loader")?.remove();

        chatBox.innerHTML += `
            <div class="bot">
                <div>⚠ Error connecting to server. Please try again.</div>
            </div>
        `;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}

/* Copy chat feature */
function copyChat(){
    let text = document.getElementById("chat-box").innerText;

    navigator.clipboard.writeText(text)
        .then(()=> alert("Chat copied ✅"))
        .catch(()=> alert("Copy failed"));
}
</script>

</body>
</html>
